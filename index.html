// ======================================================
// 8. Utility
// ======================================================
function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function getAllPlayers() {
    return [...redTeam, ...blueTeam];
}

function getBallHolder() {
    for (const player of getAllPlayers()) {
        if (player.hasBall) return player;
    }
    return null;
}

function getTeamByName(teamName) {
    return teamName === 'red' ? redTeam : blueTeam;
}

function getOpponentTeam(teamName) {
    return teamName === 'red' ? blueTeam : redTeam;
}

function getAttackingGoal(teamName) {
    return teamName === 'red' ? rightGoal : leftGoal;
}

function pointInGoal(ball, goal) {
    return (
        ball.x + ball.radius > goal.x &&
        ball.x - ball.radius < goal.x + goal.width &&
        ball.y + ball.radius > goal.y &&
        ball.y - ball.radius < goal.y + goal.height
    );
}

function distanceBetweenPoints(x1, y1, x2, y2) {
    const dx = x1 - x2;
    const dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
}

function distanceBetweenPlayers(a, b) {
    return distanceBetweenPoints(a.x, a.y, b.x, b.y);
}

function clearBallPossession() {
    for (const player of getAllPlayers()) {
        player.hasBall = false;
    }
}

function updateStealProtectionTimers() {
    for (const player of getAllPlayers()) {
        if (player.stealProtectionTimer > 0) player.stealProtectionTimer--;
    }
}

function updateActionTimers() {
    for (const player of getAllPlayers()) {
        if (player.actionTimer > 0) {
            player.actionTimer--;
            if (player.actionTimer <= 0) {
                player.actionTimer = 0;
                player.actionText = '';
            }
        }
    }
}

function updateStatusTimers() {
    for (const player of getAllPlayers()) {
        if (player.stunTimer > 0) player.stunTimer--;
        if (player.dribbleInvincibleTimer > 0) player.dribbleInvincibleTimer--;
    }
}

function updateOffBallActionTimers() {
    for (const player of getAllPlayers()) {
        if (player.offBallActionTimer > 0) {
            player.offBallActionTimer--;
        }
    }
}

function getRandomOffBallDuration() {
    return Math.floor(
        Math.random() * (OFFBALL_ACTION_MAX_FRAMES - OFFBALL_ACTION_MIN_FRAMES + 1)
    ) + OFFBALL_ACTION_MIN_FRAMES;
}

function setPlayerAction(player, text) {
    player.actionText = text;
    player.actionTimer = ACTION_LABEL_FRAMES;
}

function movePlayerTowardCurrentTarget(player) {
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);

    if (distance >= player.speed) {
        player.x += Math.cos(angle) * player.speed;
        player.y += Math.sin(angle) * player.speed;
    }

    return angle;
}

function setTargetToZone(player) {
    player.targetX = player.zoneX;
    player.targetY = player.zoneY;
}

function getCoverPosition(defenderTeamName, ballHolder) {
    const COVER_OFFSET_X = 150;

    let coverX;
    if (defenderTeamName === 'red') {
        coverX = ballHolder.x - COVER_OFFSET_X;
    } else {
        coverX = ballHolder.x + COVER_OFFSET_X;
    }

    // ★中央寄せ追加
    const CENTER_Y = FIELD_HEIGHT / 2;
    const coverY = ballHolder.y * 0.7 + CENTER_Y * 0.3;

    return {
        x: clamp(coverX, 30, FIELD_WIDTH - 30),
        y: clamp(coverY, 30, FIELD_HEIGHT - 30)
    };
}

// ======================================================
// 9. サポート位置決定
// ======================================================

// ======================================================
// 9.1 サポート候補から最適位置を選ぶ
// 中央侵入候補を追加
// ======================================================
function chooseBestSupportTarget(player, ballHolder) {
    const opponentTeam = getOpponentTeam(player.team);
    const teammateTeam = getTeamByName(player.team);

    // 9.1.1 zone からボール方向へ少し寄せる
    const dx = ballHolder.x - player.zoneX;
    const dy = ballHolder.y - player.zoneY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    let baseX = player.zoneX;
    let baseY = player.zoneY;

    if (dist > 0) {
        const scale = Math.min(SUPPORT_OFFSET, dist) / dist;
        baseX += dx * scale;
        baseY += dy * scale;
    }

    const forwardStep = 35;
    const forwardX = player.team === 'red'
        ? baseX + forwardStep
        : baseX - forwardStep;

    const centerY = FIELD_HEIGHT / 2;

    // 9.1.2 候補
    const candidates = [
        { x: baseX,    y: baseY },
        { x: baseX,    y: baseY - SUPPORT_SIDE_OPTION_OFFSET },
        { x: baseX,    y: baseY + SUPPORT_SIDE_OPTION_OFFSET },
        { x: forwardX, y: baseY },
        { x: forwardX, y: baseY - SUPPORT_SIDE_OPTION_OFFSET },
        { x: forwardX, y: baseY + SUPPORT_SIDE_OPTION_OFFSET },

        // ★中央侵入候補
        { x: forwardX, y: (baseY + centerY) / 2 },
        { x: baseX,    y: (baseY + centerY) / 2 }
    ];

    const goal = getAttackingGoal(player.team);
    const goalX = goal.x + goal.width / 2;
    const goalY = goal.y + goal.height / 2;

    let best = null;
    let bestScore = -Infinity;

    for (const c of candidates) {
        const tx = clamp(c.x, 30, FIELD_WIDTH - 30);
        const ty = clamp(c.y, 30, FIELD_HEIGHT - 30);

        // 9.1.3 敵距離
        let nearestOpp = Infinity;
        let totalOpp = 0;
        for (const o of opponentTeam) {
            const d = distanceBetweenPoints(tx, ty, o.x, o.y);
            if (d < nearestOpp) nearestOpp = d;
            totalOpp += d;
        }

        // 9.1.4 味方距離
        let nearestMate = Infinity;
        for (const m of teammateTeam) {
            if (m === player) continue;
            const d = distanceBetweenPoints(tx, ty, m.x, m.y);
            if (d < nearestMate) nearestMate = d;
        }

        // 9.1.5 ボール保持者との距離
        const distToBall = distanceBetweenPoints(tx, ty, ballHolder.x, ballHolder.y);
        const distScore = 120 - Math.abs(distToBall - 120);

        // 9.1.6 ゴール距離
        const distToGoal = distanceBetweenPoints(tx, ty, goalX, goalY);
        const goalScore = (FIELD_WIDTH - distToGoal) * 0.06;

        // 9.1.7 zone から離れすぎ抑制
        const zoneDist = distanceBetweenPoints(tx, ty, player.zoneX, player.zoneY);
        const zonePenalty = zoneDist * 0.15;

        // 9.1.8 シュートエリア侵入ボーナス
        const inShotLaneY =
            ty > FIELD_HEIGHT * 1 / 4 &&
            ty < FIELD_HEIGHT * 3 / 4;

        const inShotLaneX =
            (player.team === 'red' && tx > FIELD_WIDTH * 3 / 4) ||
            (player.team === 'blue' && tx < FIELD_WIDTH * 1 / 4);

        const shootingBonus = (inShotLaneX && inShotLaneY) ? 70 : 0;

        // 9.1.9 総合スコア
        const score =
            nearestOpp * 2.0 +
            totalOpp * 0.03 +
            Math.min(nearestMate, 120) * 0.7 +
            distScore * 1.2 +
            goalScore +
            shootingBonus -
            zonePenalty;

        if (score > bestScore) {
            bestScore = score;
            best = { x: tx, y: ty };
        }
    }

    return best;
}

// ======================================================
// 9.2 サポート移動
// ======================================================
function setSupportTarget(player, ballHolder) {
    const t = chooseBestSupportTarget(player, ballHolder);
    player.targetX = t.x;
    player.targetY = t.y;
}
// ======================================================
// 10. Off-ball actions
// 「ボールを持っていない攻撃側選手」が
// support / wide / run のどれをするか決める処理
// ======================================================

// ======================================================
// 10.1 wide の移動先
// wide を選んだときに「どこへ開くか」を点数で決める
// ======================================================
function setWideTarget(player) {
    const opponentTeam = getOpponentTeam(player.team);
    const teammateTeam = getTeamByName(player.team);

    // =========================================
    // 候補地点を作る
    // ・外へ大きく開く
    // ・少し外へ開く
    // ・少し前に出ながら外へ開く
    // =========================================
    const bigSideStep = WIDE_OFFSET_Y;
    const smallSideStep = WIDE_OFFSET_Y * 0.6;
    const forwardStep = RUN_FORWARD_DISTANCE * 0.4;

    const isUpperSide = player.homeY < FIELD_HEIGHT / 2;
    const sideDirection = isUpperSide ? -1 : 1;

    const forwardX = player.team === 'red'
        ? player.zoneX + forwardStep
        : player.zoneX - forwardStep;

    const candidates = [
        // 基本の大きいwide
        { x: player.zoneX, y: player.homeY + sideDirection * bigSideStep },

        // 少し控えめに開く
        { x: player.zoneX, y: player.homeY + sideDirection * smallSideStep },

        // 少し前に出ながら大きく開く
        { x: forwardX, y: player.homeY + sideDirection * bigSideStep },

        // 少し前に出ながら控えめに開く
        { x: forwardX, y: player.homeY + sideDirection * smallSideStep }
    ];

    const attackGoal = getAttackingGoal(player.team);
    const goalCenterX = attackGoal.x + attackGoal.width / 2;
    const goalCenterY = attackGoal.y + attackGoal.height / 2;

    let bestTarget = null;
    let bestScore = -Infinity;

    for (const c of candidates) {
        // フィールド外に出ないよう補正
        const targetX = clamp(c.x, 30, FIELD_WIDTH - 30);
        const targetY = clamp(c.y, 30, FIELD_HEIGHT - 30);

        // =========================================
        // ① 一番近い敵との距離
        // 近い敵がいないほど高得点
        // =========================================
        let nearestOpponentDistance = Infinity;
        let totalOpponentDistance = 0;

        for (const opponent of opponentTeam) {
            const d = distanceBetweenPoints(targetX, targetY, opponent.x, opponent.y);
            if (d < nearestOpponentDistance) nearestOpponentDistance = d;
            totalOpponentDistance += d;
        }

        // =========================================
        // ② 一番近い味方との距離
        // 味方とかぶる場所は不利
        // =========================================
        let nearestMateDistance = Infinity;

        for (const mate of teammateTeam) {
            if (mate === player) continue;

            const d = distanceBetweenPoints(targetX, targetY, mate.x, mate.y);
            if (d < nearestMateDistance) nearestMateDistance = d;
        }

        // =========================================
        // ③ 外側ボーナス
        // 中央から離れるほど wide らしいので加点
        // =========================================
        const outernessScore = Math.abs(targetY - FIELD_HEIGHT / 2) * 0.35;

        // =========================================
        // ④ 少しだけ前進ボーナス
        // wide でも前に出る価値はあるので少し加点
        // =========================================
        let rawForwardProgress = 0;
        if (player.team === 'red') {
            rawForwardProgress = targetX - player.x;
        } else {
            rawForwardProgress = player.x - targetX;
        }

        const forwardProgressScore = Math.max(0, rawForwardProgress) * 0.5;

        // =========================================
        // ⑤ ゴール接近ボーナス
        // 少しだけゴール方向の価値を入れる
        // =========================================
        const distanceToGoal = distanceBetweenPoints(
            targetX, targetY,
            goalCenterX, goalCenterY
        );
        const goalClosenessScore = (FIELD_WIDTH - distanceToGoal) * 0.05;

        // =========================================
        // ⑥ zoneY から離れすぎるのはむしろwideなので減点しない
        // ただし homeY から極端に離れすぎる候補は軽く抑える
        // =========================================
        const overWidePenalty = Math.abs(targetY - player.homeY) * 0.03;

        // =========================================
        // 総合点
        // ・敵から遠い
        // ・味方とかぶらない
        // ・しっかり外に開ける
        // ・少し前進できる
        // を高評価
        // =========================================
        const score =
            nearestOpponentDistance * 2.0 +
            totalOpponentDistance * 0.03 +
            Math.min(nearestMateDistance, 120) * 0.7 +
            outernessScore +
            forwardProgressScore +
            goalClosenessScore -
            overWidePenalty;

        if (score > bestScore) {
            bestScore = score;
            bestTarget = { x: targetX, y: targetY };
        }
    }

    player.targetX = bestTarget.x;
    player.targetY = bestTarget.y;
}

// ======================================================
// 10.2 run（前進＋中央侵入＋ボール寄り＋FWのみDFライン考慮）
// ======================================================
function setRunTarget(player) {
    const opponentTeam = getOpponentTeam(player.team);
    const teammateTeam = getTeamByName(player.team);

    const goal = getAttackingGoal(player.team);
    const goalX = goal.x + goal.width / 2;
    const goalY = goal.y + goal.height / 2;

    const ballHolder = getBallHolder();

    // ==================================================
    // 10.2.0 FW判定
    // ==================================================
    const isFW = player.lineType === 'fw';

    // FWだけ使う
    const lastDefenderX = isFW
        ? (player.team === 'red'
            ? Math.max(...opponentTeam.map(p => p.x))
            : Math.min(...opponentTeam.map(p => p.x)))
        : null;

    // ==================================================
    // 10.2.1 敵陣判定
    // ==================================================
    const isInAttackingHalf =
        (player.team === 'red' && player.zoneX > FIELD_WIDTH / 2) ||
        (player.team === 'blue' && player.zoneX < FIELD_WIDTH / 2);

    // ==================================================
    // 10.2.2 距離設定
    // ==================================================
    const forward = RUN_FORWARD_DISTANCE;
    const half = isInAttackingHalf ? forward * 0.8 : forward * 0.6;
    const side = isInAttackingHalf ? 90 : 60;

    const forwardX = player.team === 'red'
        ? player.zoneX + forward
        : player.zoneX - forward;

    const halfX = player.team === 'red'
        ? player.zoneX + half
        : player.zoneX - half;

    const centerY = FIELD_HEIGHT / 2;

    // ==================================================
    // 10.2.3 ボール寄りY
    // ==================================================
    const baseRunY = ballHolder
        ? player.zoneY * 0.7 + ballHolder.y * 0.3
        : player.zoneY;

    // ==================================================
    // 10.2.4 候補生成
    // ==================================================
    const candidates = [
        { x: forwardX, y: baseRunY },
        { x: forwardX, y: baseRunY - side },
        { x: forwardX, y: baseRunY + side },

        { x: halfX, y: baseRunY - side * 0.7 },
        { x: halfX, y: baseRunY + side * 0.7 },

        { x: forwardX, y: (baseRunY + centerY) / 2 },
        { x: halfX,    y: (baseRunY + centerY) / 2 }
    ];

    let best = null;
    let bestScore = -Infinity;

    // ==================================================
    // 10.2.5 評価
    // ==================================================
    for (const c of candidates) {
        const tx = clamp(c.x, 30, FIELD_WIDTH - 30);
        const ty = clamp(c.y, 30, FIELD_HEIGHT - 30);

        // 敵距離
        let nearestOpp = Infinity;
        let totalOpp = 0;
        for (const o of opponentTeam) {
            const d = distanceBetweenPoints(tx, ty, o.x, o.y);
            if (d < nearestOpp) nearestOpp = d;
            totalOpp += d;
        }

        // 味方距離
        let nearestMate = Infinity;
        for (const m of teammateTeam) {
            if (m === player) continue;
            const d = distanceBetweenPoints(tx, ty, m.x, m.y);
            if (d < nearestMate) nearestMate = d;
        }

        // 前進量
        let forwardGain = player.team === 'red'
            ? tx - player.x
            : player.x - tx;

        // ゴール距離
        const distToGoal = distanceBetweenPoints(tx, ty, goalX, goalY);

        // シュートエリアボーナス
        const inShotLaneY =
            ty > FIELD_HEIGHT * 1 / 4 &&
            ty < FIELD_HEIGHT * 3 / 4;

        const inShotLaneX =
            (player.team === 'red' && tx > FIELD_WIDTH * 3 / 4) ||
            (player.team === 'blue' && tx < FIELD_WIDTH * 1 / 4);

        const shootingBonus = (inShotLaneX && inShotLaneY) ? 80 : 0;

        // ==================================================
        // FWだけDFライン評価
        // ==================================================
        let lineScore = 0;
        let offsidePenalty = 0;
        let forwardLimitPenalty = 0;

        if (isFW && lastDefenderX !== null) {
            let distToLine;

            if (player.team === 'red') {
                distToLine = lastDefenderX - tx;
            } else {
                distToLine = tx - lastDefenderX;
            }

            // ライン手前：近いほど加点
            if (distToLine >= 0) {
                lineScore = Math.max(0, 180 - distToLine * 3);
            }

            // オフサイド位置：大幅減点
            if (distToLine < 0) {
                offsidePenalty = 1000;
            }

            // 前残り防止
            if (ballHolder) {
                const tooFarAhead = player.team === 'red'
                    ? tx > ballHolder.x + 120
                    : tx < ballHolder.x - 120;

                if (tooFarAhead) {
                    forwardLimitPenalty = 150;
                }
            }
        }

        // ==================================================
        // 総合スコア
        // ==================================================
        const score =
            nearestOpp * 2.0 +
            totalOpp * 0.03 +
            Math.max(0, forwardGain) +
            (FIELD_WIDTH - distToGoal) * 0.08 +
            Math.min(nearestMate, 120) * 0.7 +
            shootingBonus +
            lineScore -
            offsidePenalty -
            forwardLimitPenalty;

        if (score > bestScore) {
            bestScore = score;
            best = { x: tx, y: ty };
        }
    }

    player.targetX = best.x;
    player.targetY = best.y;
}
// ======================================================
// 10.3 off-ball 行動の点数計算
// support / wide / run それぞれに点数をつける
// 最終的に「一番点数が高い行動」を選ぶ
// ======================================================
function evaluateOffBall(player, team, ballHolder) {
    // 最低点を1ずつ持たせておく
    // （0スタートでもいいけど、少しだけ保険をかけてる）
    let supportScore = 1;
    let wideScore = 1;
    let runScore = 1;

    // ==================================================
    // ① ポジションごとの基本傾向
    // DF / MF / FW で「やりやすい役割」を最初に補正
    // ==================================================
    if (player.lineType === 'df') {
        // DFは受けに来すぎず、幅を取る or 少し前に出る寄り
        supportScore += 1;
        wideScore += 4;
        runScore += 3;
    } else if (player.lineType === 'mf') {
        // MFは受け役が多め
        supportScore += 4;
        wideScore += 3;
        runScore += 2;
    } else if (player.lineType === 'fw') {
        // FWは前へ走る役割が強い
        supportScore += 2;
        wideScore += 2;
        runScore += 5;
    }

    // ==================================================
    // ② チーム内で一番外側にいるか
    // ・画面中央(FIELD_HEIGHT/2)からの距離が一番大きい選手
    // ・外側なら wide をしやすくする
    // ==================================================
    let isOuterMost = true;

    for (const mate of team) {
        if (mate === player) continue;

        // 中心線からどれだけ離れているか
        const mateOuter = Math.abs(mate.y - FIELD_HEIGHT / 2);
        const playerOuter = Math.abs(player.y - FIELD_HEIGHT / 2);

        // 自分よりもっと外にいる味方がいたら、一番外側ではない
        if (mateOuter > playerOuter) {
            isOuterMost = false;
            break;
        }
    }

    if (isOuterMost) {
        // 一番外の選手は幅を取る価値が高い
        wideScore += 3;
    }

    // ==================================================
    // ③ ボール保持者との距離
    // ・近いなら受けに行く(support)価値が高い
    // ・遠いなら前へ走る(run)価値が高い
    // ==================================================
    const dx = player.x - ballHolder.x;
    const dy = player.y - ballHolder.y;
    const distToBallHolder = Math.sqrt(dx * dx + dy * dy);

    if (distToBallHolder < 150) {
        // 近いならサポートしやすい
        supportScore += 2;
    } else {
        // 遠いなら前に走って受ける価値がある
        runScore += 2;
    }

    // ==================================================
    // ④ ボール保持者より前にいるか
    // ・前にいる選手は run の価値を少し上げる
    // ・「裏へ走る」「前で受ける」意識を少し足している
    // ==================================================
    if (player.team === 'red') {
        // redは右に攻めるので x が大きいほど前
        if (player.x > ballHolder.x) {
            runScore += 2;
        }
    } else {
        // blueは左に攻めるので x が小さいほど前
        if (player.x < ballHolder.x) {
            runScore += 2;
        }
    }

    // ==================================================
    // ⑤ ボール保持者との縦方向のズレ
    // ・y が近すぎると同じレーンで被りやすい
    // ・少し離れていた方が wide の価値が上がる
    // ==================================================
    const sideGap = Math.abs(player.y - ballHolder.y);

    if (sideGap < 60) {
        // ボール保持者と同じ縦ラインに近すぎるなら、
        // 少し外へ逃げる価値を上げる
        wideScore += 2;
    }

    // 計算結果を返す
    return {
        supportScore,
        wideScore,
        runScore
    };
}

// ======================================================
// 10.4 どの off-ball 行動を選ぶか
// 点数を比較して、一番高い行動を返す
// ・supportScore が最大なら support
// ・wideScore が最大なら wide
// ・それ以外は run
// ======================================================
function chooseOffBallAction(player, team) {
    const ballHolder = getBallHolder();

    // 念のため、ボール保持者がいなければ support を返す
    // （実際には updateAttackingTeam 側で ballHolder がいる時しか
    // ここを呼ばない想定だけど、保険として入れている）
    if (!ballHolder) return 'support';

    const { supportScore, wideScore, runScore } =
        evaluateOffBall(player, team, ballHolder);

    // 点数が一番高いものを採用
    if (supportScore >= wideScore && supportScore >= runScore) {
        return 'support';
    }

    if (wideScore >= supportScore && wideScore >= runScore) {
        return 'wide';
    }

    return 'run';
}

// ======================================================
// 11. Closest player
// ======================================================
function getClosestPlayerToTarget(team, targetPlayer) {
    let closest = null;
    let closestDistance = Infinity;

    for (const player of team) {
        const dist = distanceBetweenPlayers(player, targetPlayer);
        if (dist < closestDistance) {
            closestDistance = dist;
            closest = player;
        }
    }

    return closest;
}

    


// ======================================================
// 12. Dribble target
// 数値調整版（真っすぐ前偏重を弱める）
// ======================================================
function chooseDribbleTarget(player) {
    const opponentTeam = getOpponentTeam(player.team);

    const forwardX = player.team === 'red'
        ? player.x + DRIBBLE_DISTANCE
        : player.x - DRIBBLE_DISTANCE;

    const sideOffset = DRIBBLE_SIDE_OFFSET * 1.7;

    const candidateTargets = [
        { x: forwardX, y: player.y, label: 'ドリブル' }, // 真っすぐ前
        { x: forwardX, y: player.y - sideOffset, label: 'ドリブル' }, // 左前
        { x: forwardX, y: player.y + sideOffset, label: 'ドリブル' }  // 右前
    ];

    function isGoalLaneOpen(targetX, targetY) {
        for (const opponent of opponentTeam) {
            const forwardGap = player.team === 'red'
                ? opponent.x - targetX
                : targetX - opponent.x;

            const sideGap = Math.abs(opponent.y - targetY);

            if (forwardGap > 0 && forwardGap < 140 && sideGap < 45) {
                return false;
            }
        }
        return true;
    }

    const attackGoal = getAttackingGoal(player.team);
    const goalCenterX = attackGoal.x + attackGoal.width / 2;
    const goalCenterY = attackGoal.y + attackGoal.height / 2;

    let bestCandidate = null;
    let bestScore = -Infinity;

    for (const candidate of candidateTargets) {
        const targetX = clamp(candidate.x, 30, FIELD_WIDTH - 30);
        const targetY = clamp(candidate.y, 30, FIELD_HEIGHT - 30);

        let nearestOpponentDistance = Infinity;
        let totalOpponentDistance = 0;

        for (const opponent of opponentTeam) {
            const d = distanceBetweenPoints(targetX, targetY, opponent.x, opponent.y);
            if (d < nearestOpponentDistance) nearestOpponentDistance = d;
            totalOpponentDistance += d;
        }

        let goalLaneBonus = 0;
        if (isGoalLaneOpen(targetX, targetY)) {
            goalLaneBonus = 120;
        }

        // ===== 前進ボーナス =====
        let rawForwardProgress = 0;
        if (player.team === 'red') {
            rawForwardProgress = targetX - player.x;
        } else {
            rawForwardProgress = player.x - targetX;
        }
        const forwardProgressScore = Math.max(0, rawForwardProgress) * 1.6;

        // ===== ゴール接近ボーナス（強化） =====
        const distanceToGoal = distanceBetweenPoints(
            targetX, targetY,
            goalCenterX, goalCenterY
        );
        const goalClosenessScore = (FIELD_WIDTH - distanceToGoal) * 3;

        // ===== 真っすぐ前ボーナス（弱化） =====
        let straightBonus = 0;
        if (targetY === player.y) {
            straightBonus = 8;
        }

        const score =
            nearestOpponentDistance * 2 +
            totalOpponentDistance * 0.05 +
            goalLaneBonus +
            forwardProgressScore +
            goalClosenessScore +
            straightBonus;

        if (score > bestScore) {
            bestScore = score;
            bestCandidate = { x: targetX, y: targetY, label: candidate.label };
        }
    }

    return bestCandidate;
}

    


// ======================================================
// 13. Dribble duel
// ======================================================
function getClosestAvailableDefender(team, attacker) {
    let closest = null;
    let closestDistance = Infinity;

    for (const defender of team) {
        if (defender.stunTimer > 0) continue;
        const dist = distanceBetweenPlayers(defender, attacker);
        if (dist < closestDistance) {
            closestDistance = dist;
            closest = defender;
        }
    }

    return { defender: closest, distance: closestDistance };
}

function getDribbleSuccessProbability(distance) {
    if (distance < 15) return 0.55;
    if (distance < 25) return 0.65;
    if (distance < 35) return 0.75;
    if (distance < 45) return 0.85;
    return 0.92;
}

function tryDribbleDuel(attacker, chosenDribble) {
    const opponentTeam = getOpponentTeam(attacker.team);
    const { defender, distance } = getClosestAvailableDefender(opponentTeam, attacker);

    if (!defender || distance > DRIBBLE_CHALLENGE_DISTANCE) {
        setPlayerAction(attacker, chosenDribble.label);
        attacker.targetX = chosenDribble.x;
        attacker.targetY = chosenDribble.y;
        return;
    }

    const successProbability = getDribbleSuccessProbability(distance);

    if (Math.random() < successProbability) {
        attacker.dribbleInvincibleTimer = DRIBBLE_INVINCIBLE_FRAMES;
        defender.stunTimer = DRIBBLE_STUN_FRAMES;
        setPlayerAction(attacker, chosenDribble.label + '成功');
        attacker.targetX = chosenDribble.x;
        attacker.targetY = chosenDribble.y;
    } else {
        clearBallPossession();
        movingBall.active = false;
        movingBall.target = null;
        movingBall.sourceTeam = null;

        defender.hasBall = true;
        defender.stealProtectionTimer = STEAL_PROTECTION_FRAMES;
        setPlayerAction(attacker, 'ドリブル失敗');
        setPlayerAction(defender, '奪取');

        visualBall.x = defender.x;
        visualBall.y = defender.y;
    }
}


// ======================================================
// 14. Pass lane（自陣での危険度強化版）
// ======================================================
function distancePointToSegment(px, py, ax, ay, bx, by) {
    const abx = bx - ax;
    const aby = by - ay;
    const apx = px - ax;
    const apy = py - ay;

    const abLenSq = abx * abx + aby * aby;
    if (abLenSq === 0) {
        return distanceBetweenPoints(px, py, ax, ay);
    }

    let t = (apx * abx + apy * aby) / abLenSq;
    t = clamp(t, 0, 1);

    const closestX = ax + abx * t;
    const closestY = ay + aby * t;

    return distanceBetweenPoints(px, py, closestX, closestY);
}

function getPassLanePenalty(passer, receiver, opponents) {
    let penalty = 0;

    const ax = passer.x;
    const ay = passer.y;
    const bx = receiver.x;
    const by = receiver.y;

    const abx = bx - ax;
    const aby = by - ay;
    const abLenSq = abx * abx + aby * aby;

    if (abLenSq === 0) return 0;

    // ==================================================
    // 14.1 自陣判定
    // ==================================================
    const passerInOwnHalf =
        (passer.team === 'red' && passer.x < FIELD_WIDTH / 2) ||
        (passer.team === 'blue' && passer.x > FIELD_WIDTH / 2);

    for (const opponent of opponents) {
        if (opponent.stunTimer > 0) continue;

        const apx = opponent.x - ax;
        const apy = opponent.y - ay;

        // 線分上の位置
        const rawT = (apx * abx + apy * aby) / abLenSq;

        // 範囲外は無視
        if (rawT < 0 || rawT > 1) continue;

        const laneDistance = distancePointToSegment(
            opponent.x, opponent.y,
            ax, ay,
            bx, by
        );

        if (laneDistance < PASS_LANE_DANGER_DISTANCE) {
            let positionWeight = 1.0;

            // ==================================================
            // 14.2 中央にいる敵は危険
            // ==================================================
            if (rawT > 0.15 && rawT < 0.85) positionWeight = 1.4;
            if (rawT > 0.30 && rawT < 0.70) positionWeight = 1.8;

            // ==================================================
            // 14.3 パサー近くの敵（自陣は強化）
            // ==================================================
            const distToPasser = distanceBetweenPoints(opponent.x, opponent.y, ax, ay);

            // 通常
            if (distToPasser < 60) positionWeight += passerInOwnHalf ? 1.2 : 0.8;
            if (distToPasser < 40) positionWeight += passerInOwnHalf ? 1.4 : 1.0;

            // 自陣だけさらに広く警戒
            if (passerInOwnHalf && distToPasser < 80) {
                positionWeight += 0.6;
            }

            // ==================================================
            // 14.4 減点計算
            // ==================================================
            const closeness = PASS_LANE_DANGER_DISTANCE - laneDistance;
            penalty += closeness * 6 * positionWeight;
        }
    }

    return penalty;
}

    
// ======================================================
// 15. Pass target
// 簡易オフサイド対応版（相手の最終ラインxを直接使用）
// 一時停止時表示 + 常時 passRank 更新版
// ======================================================
function chooseBestPassTarget(passer, team) {
    let bestTarget = null;
    let bestScore = -Infinity;

    clearPassRanks();
    const ranked = [];

    // ===== パサーが味方の中でどれだけ前にいるかを判定 =====
    const sortedByForwardDepth = [...team].sort((a, b) => {
        if (passer.team === 'red') {
            return b.x - a.x; // redはxが大きいほど前
        } else {
            return a.x - b.x; // blueはxが小さいほど前
        }
    });

    const passerForwardRank = sortedByForwardDepth.findIndex(p => p === passer) + 1;
    const passerIsTop3Forward = passerForwardRank <= 3;

    // ===== パサー以外に敵陣の味方が1人でもいるか =====
    const hasOtherTeammateInAttackingHalf = team.some(player => {
        if (player === passer) return false;

        return (
            (passer.team === 'red' && player.x > FIELD_WIDTH / 2) ||
            (passer.team === 'blue' && player.x < FIELD_WIDTH / 2)
        );
    });

    for (const mate of team) {
        if (mate === passer) continue;

        // 表示を毎回初期化
        mate.passScoreText = '';

        // ===== 簡易オフサイド判定（相手の最終ラインxを直接使う） =====
        const opponentTeam = getOpponentTeam(passer.team);

        const mateInAttackingHalf =
            (passer.team === 'red' && mate.x > FIELD_WIDTH / 2) ||
            (passer.team === 'blue' && mate.x < FIELD_WIDTH / 2);

        const mateAheadOfBall =
            (passer.team === 'red' && mate.x > passer.x) ||
            (passer.team === 'blue' && mate.x < passer.x);

        const lastDefenderX = passer.team === 'red'
            ? Math.max(...opponentTeam.map(p => p.x))
            : Math.min(...opponentTeam.map(p => p.x));

        const isOffside =
            mateInAttackingHalf &&
            mateAheadOfBall &&
            (
                (passer.team === 'red' && mate.x > lastDefenderX) ||
                (passer.team === 'blue' && mate.x < lastDefenderX)
            );

        if (isOffside) {
            mate.passScoreText = 'OFF';
            continue;
        }

        // ===== 前線3人ルール =====
        const mateInOwnHalf =
            (passer.team === 'red' && mate.x < FIELD_WIDTH / 2) ||
            (passer.team === 'blue' && mate.x > FIELD_WIDTH / 2);

        if (passerIsTop3Forward && hasOtherTeammateInAttackingHalf && mateInOwnHalf) {
            mate.passScoreText = 'BACK';
            continue;
        }

        // ===== 距離 =====
        const dx = mate.x - passer.x;
        const dy = mate.y - passer.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // ===== 距離スコア =====
        let distanceScore = 0;
        if (distance < 50) distanceScore = -30;
        else if (distance < 120) distanceScore = 60;
        else if (distance < 200) distanceScore = 20;
        else if (distance < 400) distanceScore = -250;
        else distanceScore = -1000;

        // ===== 敵との距離 =====
        let nearestOpponentDistance = Infinity;
        let totalOpponentDistance = 0;

        for (const opponent of opponentTeam) {
            const d = distanceBetweenPlayers(mate, opponent);
            totalOpponentDistance += d;
            if (d < nearestOpponentDistance) nearestOpponentDistance = d;
        }

        // ===== パスコース妨害 =====
        const passLanePenalty = getPassLanePenalty(passer, mate, opponentTeam);

        // ===== 前進量（正なら前、負なら後ろ） =====
        let rawForwardProgress = 0;

        if (passer.team === 'red') {
            rawForwardProgress = mate.x - passer.x;
        } else {
            rawForwardProgress = passer.x - mate.x;
        }

        // ===== 前進ボーナス =====
        const forwardProgress = Math.max(0, rawForwardProgress);
        const forwardProgressScore = forwardProgress * 1.5;

        // ===== ゴール接近ボーナス =====
        const attackGoal = getAttackingGoal(passer.team);
        const goalCenterX = attackGoal.x + attackGoal.width / 2;
        const goalCenterY = attackGoal.y + attackGoal.height / 2;

        const mateDistanceToGoal = distanceBetweenPoints(
            mate.x, mate.y,
            goalCenterX, goalCenterY
        );

        const goalClosenessScore = (FIELD_WIDTH - mateDistanceToGoal) * 0.1;

        // ===== 敵陣判定 =====
        const passerInAttackingHalf =
            (passer.team === 'red' && passer.x > FIELD_WIDTH / 2) ||
            (passer.team === 'blue' && passer.x < FIELD_WIDTH / 2);

        // ===== 敵陣 × 戻り量で減点 =====
        let backwardPassPenalty = 0;

        if (passerInAttackingHalf) {
            if (rawForwardProgress < -120) {
                backwardPassPenalty = 400;
            } else if (rawForwardProgress < -60) {
                backwardPassPenalty = 300;
            } else if (rawForwardProgress < -20) {
                backwardPassPenalty = 70;
            } else if (rawForwardProgress < 20) {
                backwardPassPenalty = 5;
            }
        }

        // ===== 総合スコア =====
        const score =
            nearestOpponentDistance * 2 +
            totalOpponentDistance * 0.02 +
            distanceScore +
            forwardProgressScore +
            goalClosenessScore -
            passLanePenalty -
            backwardPassPenalty;

        // ===== 一時停止時表示用 =====
        mate.passScoreText = Math.round(score).toString();

        // ===== ランキング保存 =====
        ranked.push({ player: mate, score });

        if (score > bestScore) {
            bestScore = score;
            bestTarget = mate;
        }
    }

    ranked.sort((a, b) => b.score - a.score);

    if (ranked[0]) ranked[0].player.passRank = 1;
    if (ranked[1]) ranked[1].player.passRank = 2;
    if (ranked[2]) ranked[2].player.passRank = 3;

    return bestTarget;
}
    
// ======================================================
// 16. Zones with effective home
// 攻撃時はボール位置に応じてDF・MFを追加で押し上げる
// ======================================================
function updateTeamZones(team, teamName, isAttacking, referenceBallX, referenceBallY) {
    const ballOffsetFromCenterX = referenceBallX - FIELD_WIDTH / 2;
    const sideShift = ballOffsetFromCenterX * SIDE_SLIDE_RATIO;

    for (const player of team) {
        let effectiveHomeX = player.homeX;
        let effectiveHomeY = player.homeY;

        if (isAttacking) {
            let attackShift = 0;

            // 16.1 基本の押し上げ
            if (player.lineType === 'df') {
                attackShift = DF_ATTACK_HOME_SHIFT;
            } else if (player.lineType === 'mf' || player.lineType === 'fw') {
                attackShift = MF_FW_ATTACK_HOME_SHIFT;
            }

            // 16.2 ボール位置で追加押し上げ
            let extraShift = 0;

            const ballInAttackingHalf =
                (teamName === 'red' && referenceBallX > FIELD_WIDTH / 2) ||
                (teamName === 'blue' && referenceBallX < FIELD_WIDTH / 2);

            const ballInFinalThird =
                (teamName === 'red' && referenceBallX > FIELD_WIDTH * 2 / 3) ||
                (teamName === 'blue' && referenceBallX < FIELD_WIDTH * 1 / 3);

            if (ballInAttackingHalf) {
                if (player.lineType === 'df') extraShift += 40;
                if (player.lineType === 'mf') extraShift += 50;
            }

            if (ballInFinalThird) {
                if (player.lineType === 'df') extraShift += 30;
                if (player.lineType === 'mf') extraShift += 40;
            }

            attackShift += extraShift;

            effectiveHomeX += teamName === 'red' ? attackShift : -attackShift;
        } else {
            // 16.3 守備時は少し下げる
            effectiveHomeX += teamName === 'red' ? -DEFENSE_BACK_SHIFT : DEFENSE_BACK_SHIFT;
        }

        // 16.4 ボール位置に応じた横スライド
        const shiftedX = effectiveHomeX + sideShift;
        const shiftedY = effectiveHomeY;

        player.zoneX = clamp(shiftedX, 30, FIELD_WIDTH - 30);
        player.zoneY = clamp(shiftedY, 30, FIELD_HEIGHT - 30);
    }
}

// ======================================================
// 17. Reset
// ======================================================
function resetGame() {
    redTeam = createRedTeam();
    blueTeam = createBlueTeam();

    movingBall.active = false;
    movingBall.x = 0;
    movingBall.y = 0;
    movingBall.target = null;
    movingBall.sourceTeam = null;

    visualBall.x = redTeam[0].x;
    visualBall.y = redTeam[0].y;
}

function startRestart(scoringTeam) {
    isRestarting = true;
    restartTimer = 90;

    if (scoringTeam === 'red') scoreRed++;
    else if (scoringTeam === 'blue') scoreBlue++;
}

function updateRestart() {
    if (!isRestarting) return;
    restartTimer--;
    if (restartTimer <= 0) {
        isRestarting = false;
        resetGame();
    }
}

// ======================================================
// 18 攻撃AI
// ======================================================

// ======================================================
// 18.1 状況チェック
// ゴール方向コーン内の敵もチェック
// ======================================================
function analyzeBallHolderState(player, team) {
    const opponentTeam = getOpponentTeam(player.team);

    // 18.1.1 全方向で一番近い敵
    let nearestDefenderDistance = Infinity;
    for (const opponent of opponentTeam) {
        const dist = distanceBetweenPlayers(player, opponent);
        if (dist < nearestDefenderDistance) nearestDefenderDistance = dist;
    }

    // 18.1.2 ゴール方向コーン内の一番近い敵
    let nearestFrontConeOpponentDistance = Infinity;

    const attackGoal = getAttackingGoal(player.team);
    const goalCenterX = attackGoal.x + attackGoal.width / 2;
    const goalCenterY = attackGoal.y + attackGoal.height / 2;

    const forwardAngle = Math.atan2(
        goalCenterY - player.y,
        goalCenterX - player.x
    );

    for (const opponent of opponentTeam) {
        const dx = opponent.x - player.x;
        const dy = opponent.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist === 0) continue;

        const angleToOpponent = Math.atan2(dy, dx);

        let angleDiff = Math.abs(angleToOpponent - forwardAngle);
        if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;

        // ±30度
        const inFrontCone = angleDiff < Math.PI / 6;

        if (inFrontCone && dist < nearestFrontConeOpponentDistance) {
            nearestFrontConeOpponentDistance = dist;
        }
    }

    // 18.1.3 後ろ4枚判定
    const sortedByBackDepth = [...team].sort((a, b) => {
        if (player.team === 'red') return a.x - b.x;
        else return b.x - a.x;
    });

    const backRank = sortedByBackDepth.findIndex(p => p === player) + 1;
    const isBack4 = backRank <= 4;

    // 18.1.4 ゴール距離
    const distanceToGoal = distanceBetweenPoints(
        player.x, player.y,
        goalCenterX, goalCenterY
    );

    // 18.1.5 自陣 / 敵陣
    const isInOwnHalf =
        (player.team === 'red' && player.x < FIELD_WIDTH / 2) ||
        (player.team === 'blue' && player.x > FIELD_WIDTH / 2);

    const isInAttackingHalf = !isInOwnHalf;

    // 18.1.6 シュート可能エリア（奥1/4 ＆ 中央1/2）
    const isInShootingZone =
        (
            (player.team === 'red' && player.x > FIELD_WIDTH * 3 / 4) ||
            (player.team === 'blue' && player.x < FIELD_WIDTH * 1 / 4)
        ) &&
        (
            player.y > FIELD_HEIGHT * 1 / 4 &&
            player.y < FIELD_HEIGHT * 3 / 4
        );

    // 18.1.7 ドリブル先
    const dribbleChoice = chooseDribbleTarget(player);

    return {
        nearestDefenderDistance,
        nearestFrontConeOpponentDistance,
        isBack4,
        distanceToGoal,
        isInOwnHalf,
        isInAttackingHalf,
        isInShootingZone,
        dribbleChoice
    };
}

// ======================================================
// 18.2 確率決定
// ゴール方向コーンが空いていればドリブル寄り
// ======================================================
function getAttackingActionProbabilities(player, state) {
    const {
        nearestDefenderDistance,
        nearestFrontConeOpponentDistance,
        isBack4,
        distanceToGoal,
        isInOwnHalf,
        isInAttackingHalf,
        isInShootingZone,
        dribbleChoice
    } = state;

    // 18.2.1 行動発生確率
    let actionProbability = 0.02;
    if (nearestDefenderDistance < 120) actionProbability = 0.10;
    if (nearestDefenderDistance < 80) actionProbability = 0.15;
    if (nearestDefenderDistance < 55) actionProbability = 0.25;
    if (nearestDefenderDistance < 35) actionProbability = 0.50;

    // 18.2.2 基本確率
    let passProbability = 0.35;
    let shootProbability = 0.15;
    let dribbleProbability = 0.50;

    // 18.2.3 近い敵で調整
    if (nearestDefenderDistance < 120) {
        passProbability = 0.36;
        shootProbability = 0.18;
        dribbleProbability = 0.46;
    }
    if (nearestDefenderDistance < 80) {
        passProbability = 0.38;
        shootProbability = 0.14;
        dribbleProbability = 0.48;
    }
    if (nearestDefenderDistance < 55) {
        passProbability = 0.40;
        shootProbability = 0.10;
        dribbleProbability = 0.50;
    }
    if (nearestDefenderDistance < 35) {
        passProbability = 0.42;
        shootProbability = 0.06;
        dribbleProbability = 0.52;
    }

    // 18.2.4 ゴール距離で調整
    if (distanceToGoal < 180) {
        shootProbability += 0.12;
        passProbability -= 0.08;
        dribbleProbability -= 0.04;
    }
    if (distanceToGoal < 120) {
        shootProbability += 0.10;
        passProbability -= 0.07;
        dribbleProbability -= 0.03;
    }

    // 18.2.5 敵陣ならややドリブル寄り
    if (isInAttackingHalf) {
        passProbability -= 0.12;
        dribbleProbability += 0.12;
    }

    // 18.2.6 ドリブル先があり、余裕がある時はさらにドリブル寄り
    if (
        dribbleChoice &&
        nearestDefenderDistance > 55 &&
        !isBack4 &&
        isInAttackingHalf
    ) {
        passProbability -= 0.15;
        dribbleProbability += 0.15;
    }

    // 18.2.7 ゴール方向コーンが空いていればドリブル寄り
    if (
        isInAttackingHalf &&
        dribbleChoice &&
        nearestFrontConeOpponentDistance > 120
    ) {
        passProbability -= 0.18;
        dribbleProbability += 0.18;
    } else if (
        isInAttackingHalf &&
        dribbleChoice &&
        nearestFrontConeOpponentDistance > 80
    ) {
        passProbability -= 0.10;
        dribbleProbability += 0.10;
    }

    // 18.2.8 シュート制限
    if (!isInShootingZone) {
        shootProbability = 0;
    }

    // 18.2.9 後ろ4枚 + プレッシャー時はドリブル禁止
    if (isBack4 && nearestDefenderDistance < 80) {
        dribbleProbability = 0;
    }

    // 18.2.10 自陣ではシュート禁止
    if (isInOwnHalf) {
        shootProbability = 0;
    }

    // 18.2.11 保護期間中はパス禁止
    if (player.stealProtectionTimer > 0) {
        passProbability = 0;
    }

    // 18.2.12 正規化
    passProbability = Math.max(0, passProbability);
    shootProbability = Math.max(0, shootProbability);
    dribbleProbability = Math.max(0, dribbleProbability);

    const total = passProbability + shootProbability + dribbleProbability;

    return {
        actionProbability,
        passProbability: passProbability / total,
        shootProbability: shootProbability / total,
        dribbleProbability: dribbleProbability / total
    };
}

// ======================================================
// 18.3 行動実行
// ======================================================
function executeAttackingAction(player, team, probs, state) {
    const { passProbability, shootProbability } = probs;
    const { dribbleChoice } = state;

    const choice = Math.random();

    if (choice < passProbability) {
        const bestTarget = chooseBestPassTarget(player, team);

        if (bestTarget) {
            setPlayerAction(player, 'パス');
            player.hasBall = false;

            movingBall.active = true;
            movingBall.x = visualBall.x;
            movingBall.y = visualBall.y;
            movingBall.sourceTeam = player.team;
            movingBall.speed = 9;
            movingBall.target = bestTarget;

        } else if (dribbleChoice) {
            tryDribbleDuel(player, dribbleChoice);
        }

    } else if (choice < passProbability + shootProbability) {
        const attackGoal = getAttackingGoal(player.team);

        setPlayerAction(player, 'シュート');
        player.hasBall = false;

        movingBall.active = true;
        movingBall.x = visualBall.x;
        movingBall.y = visualBall.y;
        movingBall.sourceTeam = player.team;
        movingBall.speed = 9;

        movingBall.target = {
            x: attackGoal.x + attackGoal.width / 2,
            y: attackGoal.y + attackGoal.height / 2,
            radius: 0,
            isGoalPoint: true
        };

    } else {
        if (dribbleChoice) {
            tryDribbleDuel(player, dribbleChoice);
        }
    }
}

// ======================================================
// 18.4 全体更新（メイン）
// actionProbText 更新 + passRank常時更新版
// ======================================================
function updateAttackingTeam(team) {
    const ballHolder = getBallHolder();

    for (const player of team) {
        if (player.stunTimer > 0) continue;

        const isCurrentReceiver = movingBall.active && movingBall.target === player;

        if (isCurrentReceiver) {
            player.targetX = movingBall.x;
            player.targetY = movingBall.y;
            player.offBallActionTimer = 0;

        } else if (player.hasBall) {
            player.offBallActionTimer = 0;

        } else if (ballHolder) {
            if (player.offBallActionTimer <= 0) {
                player.offBallAction = chooseOffBallAction(player, team);
                player.offBallActionTimer = getRandomOffBallDuration();
            }

            if (player.offBallAction === 'support') {
                setSupportTarget(player, ballHolder);
                setPlayerAction(player, 'support');
            } else if (player.offBallAction === 'wide') {
                setWideTarget(player);
                setPlayerAction(player, 'wide');
            } else if (player.offBallAction === 'run') {
                setRunTarget(player);
                setPlayerAction(player, 'run');
            }

        } else {
            setTargetToZone(player);
            player.offBallActionTimer = 0;
        }

        const angle = movePlayerTowardCurrentTarget(player);

        if (player.hasBall) {
            visualBall.x = player.x + Math.cos(angle) * (player.radius + 6);
            visualBall.y = player.y + Math.sin(angle) * (player.radius + 6);

            // 常時ベストパス候補・上位3候補を更新
            chooseBestPassTarget(player, team);

            const state = analyzeBallHolderState(player, team);
            const probs = getAttackingActionProbabilities(player, state);

            // 行動選択確率の表示
            player.actionProbText =
                `P:${Math.round(probs.passProbability * 100)} ` +
                `S:${Math.round(probs.shootProbability * 100)} ` +
                `D:${Math.round(probs.dribbleProbability * 100)}`;

            if (Math.random() < probs.actionProbability) {
                executeAttackingAction(player, team, probs, state);
            }
        }
    }
}

    
// ======================================================
// 19. 守備AI
// press / cover / zoneスライド
// 自陣で相手が持った時は zone担当も少し強めに寄せる
// ======================================================
function updateDefendingTeam(team, ballHolder) {
    if (!ballHolder) {
        for (const defender of team) {
            if (defender.stunTimer > 0) continue;
            setTargetToZone(defender);
            movePlayerTowardCurrentTarget(defender);
        }
        return;
    }

    const availableDefenders = team.filter(p => p.stunTimer <= 0);

    // 19.1 press役
    const pressingDefender = availableDefenders.length > 0
        ? getClosestPlayerToTarget(availableDefenders, ballHolder)
        : null;

    // 19.2 cover役
    const coverCandidates = availableDefenders.filter(p => p !== pressingDefender);
    const coverDefender = coverCandidates.length > 0
        ? getClosestPlayerToTarget(coverCandidates, ballHolder)
        : null;

    // 19.3 全体更新
    for (const defender of team) {
        if (defender.stunTimer > 0) continue;

        // -----------------------------
        // 19.3.1 press
        // -----------------------------
        if (defender === pressingDefender) {
            const dx = ballHolder.x - defender.x;
            const dy = ballHolder.y - defender.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            const canStealCurrentHolder =
                ballHolder.stealProtectionTimer <= 0 &&
                ballHolder.dribbleInvincibleTimer <= 0;

            if (canStealCurrentHolder && distance <= STEAL_DISTANCE) {
                clearBallPossession();

                movingBall.active = false;
                movingBall.target = null;
                movingBall.sourceTeam = null;

                defender.hasBall = true;
                defender.stealProtectionTimer = STEAL_PROTECTION_FRAMES;

                visualBall.x = defender.x;
                visualBall.y = defender.y;
                setPlayerAction(defender, '奪取');
                return;
            }

            if (distance > PRESS_DISTANCE) {
                defender.targetX = ballHolder.x;
                defender.targetY = ballHolder.y;
            }

            setPlayerAction(defender, 'press');
        }

        // -----------------------------
        // 19.3.2 cover
        // -----------------------------
        else if (defender === coverDefender) {
            const coverPos = getCoverPosition(defender.team, ballHolder);
            defender.targetX = coverPos.x;
            defender.targetY = coverPos.y;
            setPlayerAction(defender, 'cover');
        }

        // -----------------------------
        // 19.3.3 zoneスライド
        // -----------------------------
        else {
            const CENTER_Y = FIELD_HEIGHT / 2;

            // 守備側から見て自陣で相手が持っているか
            const opponentInDefendingHalf =
                (defender.team === 'red' && ballHolder.x < FIELD_WIDTH / 2) ||
                (defender.team === 'blue' && ballHolder.x > FIELD_WIDTH / 2);

            let targetX;
            let targetY;

            if (opponentInDefendingHalf) {
                // 自陣では少し強めにボール側へ寄せる
                targetX = clamp(
                    defender.zoneX * 0.6 + ballHolder.x * 0.4,
                    30,
                    FIELD_WIDTH - 30
                );

                targetY = clamp(
                    defender.zoneY * 0.52 + ballHolder.y * 0.28 + CENTER_Y * 0.20,
                    30,
                    FIELD_HEIGHT - 30
                );
            } else {
                // それ以外は通常スライド
                targetX = clamp(
                    defender.zoneX * 0.7 + ballHolder.x * 0.3,
                    30,
                    FIELD_WIDTH - 30
                );

                targetY = clamp(
                    defender.zoneY * 0.6 + ballHolder.y * 0.2 + CENTER_Y * 0.2,
                    30,
                    FIELD_HEIGHT - 30
                );
            }

            defender.targetX = targetX;
            defender.targetY = targetY;
        }

        movePlayerTowardCurrentTarget(defender);
    }
}

// ======================================================
// 20. Player update controller
// ======================================================
function updatePlayers() {
    const ballHolder = getBallHolder();

    const referenceBallX = movingBall.active ? movingBall.x : visualBall.x;
    const referenceBallY = movingBall.active ? movingBall.y : visualBall.y;

    if (ballHolder) {
        const attackingTeam = getTeamByName(ballHolder.team);
        const defendingTeam = getOpponentTeam(ballHolder.team);

        updateTeamZones(attackingTeam, ballHolder.team, true, referenceBallX, referenceBallY);
        updateTeamZones(defendingTeam, defendingTeam[0].team, false, referenceBallX, referenceBallY);

        updateAttackingTeam(attackingTeam);
        updateDefendingTeam(defendingTeam, ballHolder);

    } else if (movingBall.active && movingBall.sourceTeam) {
        const attackingTeam = getTeamByName(movingBall.sourceTeam);
        const defendingTeam = getOpponentTeam(movingBall.sourceTeam);

        updateTeamZones(attackingTeam, movingBall.sourceTeam, true, referenceBallX, referenceBallY);
        updateTeamZones(defendingTeam, defendingTeam[0].team, false, referenceBallX, referenceBallY);

        // パス中のボールを仮の守備対象にする
        const virtualBallHolder = {
            x: movingBall.x,
            y: movingBall.y,
            stealProtectionTimer: 0,
            dribbleInvincibleTimer: 0
        };

        // 守備側はパス中でも守備AIを継続
        updateDefendingTeam(defendingTeam, virtualBallHolder);

        // 攻撃側は受け手だけボールへ、他は基本ゾーンへ
        for (const player of attackingTeam) {
            if (player.stunTimer > 0) continue;

            if (movingBall.target === player) {
                player.targetX = movingBall.x;
                player.targetY = movingBall.y;
            } else {
                setTargetToZone(player);
            }

            movePlayerTowardCurrentTarget(player);
        }

    } else {
        updateTeamZones(redTeam, 'red', false, referenceBallX, referenceBallY);
        updateTeamZones(blueTeam, 'blue', false, referenceBallX, referenceBallY);

        for (const player of redTeam) {
            if (player.stunTimer > 0) continue;
            setTargetToZone(player);
            movePlayerTowardCurrentTarget(player);
        }

        for (const player of blueTeam) {
            if (player.stunTimer > 0) continue;
            setTargetToZone(player);
            movePlayerTowardCurrentTarget(player);
        }
    }
}

// ======================================================
// 21. Interception
// ======================================================
function checkInterception() {
    if (!movingBall.active || !movingBall.sourceTeam) return false;

    const interceptingTeam = getOpponentTeam(movingBall.sourceTeam);

    for (const player of interceptingTeam) {
        if (player.stunTimer > 0) continue;

        const distanceToBall = distanceBetweenPoints(
            player.x, player.y,
            movingBall.x, movingBall.y
        );

        // ボールが速いほどインターセプト可能半径を小さくする
        const effectiveInterceptDistance = Math.max(
            8,
            INTERCEPT_DISTANCE - movingBall.speed * 0.8
        );

        if (distanceToBall <= effectiveInterceptDistance) {
            // ボールが速いほど成功率を下げる
            let interceptSuccessProbability = 0.95;

            if (movingBall.speed > 8) {
                interceptSuccessProbability = 0.35;
            } else if (movingBall.speed > 6) {
                interceptSuccessProbability = 0.55;
            } else if (movingBall.speed > 4) {
                interceptSuccessProbability = 0.75;
            }

            if (Math.random() < interceptSuccessProbability) {
                clearBallPossession();

                movingBall.active = false;
                movingBall.target = null;
                movingBall.sourceTeam = null;

                player.hasBall = true;
                player.stealProtectionTimer = STEAL_PROTECTION_FRAMES;
                setPlayerAction(player, 'インターセプト');

                visualBall.x = player.x;
                visualBall.y = player.y;

                return true;
            } else {
                // 失敗したら少し硬直
                player.stunTimer = INTERCEPT_FAIL_STUN_FRAMES;
                setPlayerAction(player, '届かず');
            }
        }
    }

    return false;
}


//-----------------------------
// 22. ボールの挙動
//-----------------------------
function updateBall() {
    if (!movingBall.active) return;

    const dx = movingBall.target.x - movingBall.x;
    const dy = movingBall.target.y - movingBall.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);

    movingBall.x += Math.cos(angle) * movingBall.speed;
    movingBall.y += Math.sin(angle) * movingBall.speed;
    visualBall.x = movingBall.x;
    visualBall.y = movingBall.y;

    // 減速
    movingBall.speed *= 0.98;
    movingBall.speed = Math.max(movingBall.speed, 1.5);

    const wasIntercepted = checkInterception();
    if (wasIntercepted) return;

    const allPlayers = getAllPlayers();
    const isRealPlayer = allPlayers.includes(movingBall.target);

    if (isRealPlayer && distance < movingBall.target.radius + 10) {
        movingBall.active = false;
        movingBall.target.hasBall = true;
        movingBall.target.stealProtectionTimer = STEAL_PROTECTION_FRAMES;
        movingBall.sourceTeam = null;
        setPlayerAction(movingBall.target, '受ける');
    }

    if (
        movingBall.x < -20 || movingBall.x > FIELD_WIDTH + 20 ||
        movingBall.y < -20 || movingBall.y > FIELD_HEIGHT + 20
    ) {
        movingBall.active = false;
        movingBall.target = null;
        movingBall.sourceTeam = null;
        resetGame();
    }
}

// ======================================================
// 23. Goal check
// ======================================================
function checkGoal() {
    if (!movingBall.active) return;

    if (pointInGoal(visualBall, rightGoal)) {
        movingBall.active = false;
        movingBall.target = null;
        movingBall.sourceTeam = null;
        startRestart('red');
        return;
    }

    if (pointInGoal(visualBall, leftGoal)) {
        movingBall.active = false;
        movingBall.target = null;
        movingBall.sourceTeam = null;
        startRestart('blue');
        return;
    }
}
    

// ======================================================
// 24. Update
// 保持チームが変わったら passScoreText / actionProbText を消す版
// ======================================================
function update() {
    if (isRestarting) {
        updateRestart();
        return;
    }

    const ballHolder = getBallHolder();
    const currentHolderTeam = ballHolder ? ballHolder.team : null;

    // ボール保持チームが変わったら表示を消す
    if (currentHolderTeam !== lastBallHolderTeamForDebug) {
        clearPassScoreTexts();
        clearActionProbTexts();
        lastBallHolderTeamForDebug = currentHolderTeam;
    }

    updateStealProtectionTimers();
    updateActionTimers();
    updateStatusTimers();
    updateOffBallActionTimers();
    updatePlayers();
    updateBall();
    checkGoal();
}
    

// ======================================================
// 25. Draw
// ======================================================

// 25.1 フィールド
function drawField() {
    ctx.fillStyle = '#2e8b57';
    ctx.fillRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(FIELD_WIDTH / 2, 0);
    ctx.lineTo(FIELD_WIDTH / 2, FIELD_HEIGHT);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(FIELD_WIDTH / 2, FIELD_HEIGHT / 2, 70, 0, Math.PI * 2);
    ctx.stroke();
}

// 25.2 ゴール
function drawGoals() {
    ctx.fillStyle = '#dddddd';
    ctx.fillRect(leftGoal.x, leftGoal.y, leftGoal.width, leftGoal.height);
    ctx.fillRect(rightGoal.x, rightGoal.y, rightGoal.width, rightGoal.height);
}

// 25.3 ボール保持者の前方コーン
function drawBallHolderCone() {
    const ballHolder = getBallHolder();
    if (!ballHolder) return;

    const attackGoal = getAttackingGoal(ballHolder.team);
    const goalCenterX = attackGoal.x + attackGoal.width / 2;
    const goalCenterY = attackGoal.y + attackGoal.height / 2;

    const forwardAngle = Math.atan2(
        goalCenterY - ballHolder.y,
        goalCenterX - ballHolder.x
    );

    const coneHalfAngle = Math.PI / 6; // ±30度
    const coneLength = 160;

    const leftAngle = forwardAngle - coneHalfAngle;
    const rightAngle = forwardAngle + coneHalfAngle;

    const leftX = ballHolder.x + Math.cos(leftAngle) * coneLength;
    const leftY = ballHolder.y + Math.sin(leftAngle) * coneLength;

    const rightX = ballHolder.x + Math.cos(rightAngle) * coneLength;
    const rightY = ballHolder.y + Math.sin(rightAngle) * coneLength;

    ctx.beginPath();
    ctx.moveTo(ballHolder.x, ballHolder.y);
    ctx.lineTo(leftX, leftY);
    ctx.lineTo(rightX, rightY);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255, 255, 0, 0.12)';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(ballHolder.x, ballHolder.y);
    ctx.lineTo(leftX, leftY);
    ctx.lineTo(rightX, rightY);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255, 255, 0, 0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
}


// ======================================================
// 25.4 drawTeam(team)
// passScoreText + actionProbText + passRankリング描画版
// ======================================================
function drawTeam(team) {
    for (const player of team) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();

        // パス候補順位リング
        if (player.passRank > 0) {
            ctx.beginPath();

            if (player.passRank === 1) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 4;
            } else if (player.passRank === 2) {
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 3;
            } else if (player.passRank === 3) {
                ctx.strokeStyle = '#ff9900';
                ctx.lineWidth = 2;
            }

            ctx.arc(player.x, player.y, player.radius + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.closePath();
        }

        ctx.fillStyle = 'white';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(player.label, player.x, player.y);

        // 行動確率（ボール保持者用）
        if (player.actionProbText) {
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(player.actionProbText, player.x, player.y - 56);
        }

        // パス候補スコア / OFF / BACK
        if (player.passScoreText) {
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(player.passScoreText, player.x, player.y - 42);
        }

        // 行動ラベル
        if (player.actionText && player.actionTimer > 0) {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(player.actionText, player.x, player.y - 28);
        }

        // 奪取保護
        if (player.stealProtectionTimer > 0) {
            ctx.fillStyle = 'yellow';
            ctx.font = 'bold 10px Arial';
            ctx.fillText('P', player.x, player.y - 16);
        }

        // ドリブル無敵
        if (player.dribbleInvincibleTimer > 0) {
            ctx.fillStyle = '#00ffff';
            ctx.font = 'bold 10px Arial';
            ctx.fillText('INV', player.x, player.y - 40);
        }

        // スタン
        if (player.stunTimer > 0) {
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 10px Arial';
            ctx.fillText('STUN', player.x, player.y - 52);
        }

        // home位置
        ctx.beginPath();
        ctx.arc(player.homeX, player.homeY, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.16)';
        ctx.fill();
        ctx.closePath();

        // zone位置
        ctx.beginPath();
        ctx.arc(player.zoneX, player.zoneY, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,0,0.24)';
        ctx.fill();
        ctx.closePath();
    }
}
    
    
// 25.5 ボール
function drawBall() {
    const someoneHasBall = getBallHolder() !== null;
    if (!(movingBall.active || someoneHasBall)) return;

    ctx.beginPath();
    ctx.arc(visualBall.x, visualBall.y, visualBall.radius, 0, Math.PI * 2);
    ctx.fillStyle = visualBall.color;
    ctx.fill();
    ctx.closePath();
}

// 25.6 UI
function drawUI() {
    ctx.fillStyle = 'white';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`${scoreRed} - ${scoreBlue}`, FIELD_WIDTH / 2, 32);

    if (isRestarting) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.fillRect(0, 0, FIELD_WIDTH, FIELD_HEIGHT);

        ctx.fillStyle = 'yellow';
        ctx.font = 'bold 34px Arial';
        ctx.fillText('GOAL!', FIELD_WIDTH / 2, FIELD_HEIGHT / 2);
    }
}

// 25.7 全体描画
function draw() {
    drawField();
    drawGoals();
    drawBallHolderCone();

    drawTeam(redTeam);   // ← 追加
    drawTeam(blueTeam);  // ← 追加

    drawBall();
    drawUI();
}
    
// ======================================================
// 26. Main loop
// ======================================================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

resetGame();
loop();

// ======================================================
// 27. 速度操作・一時停止・コマ送り
// 既存コードは変更せず、末尾に追記するだけ
// ======================================================

// 27.1 状態
let gameSpeedMode = 1;   // 1 = 通常, 2 = 1/2倍, 4 = 1/4倍
let isPausedByUser = false;
let stepRequested = false;
let speedFrameCounter = 0;

// 27.2 元の update を保存
const originalUpdate = update;

// 27.3 update を上書きして速度制御を追加
update = function () {
    // 一時停止中
    if (isPausedByUser) {
        if (stepRequested) {
            stepRequested = false;
            originalUpdate(); // 1フレームだけ進める
        }
        return;
    }

    // 通常速度
    if (gameSpeedMode === 1) {
        originalUpdate();
        return;
    }

    // 1/2倍, 1/4倍
    speedFrameCounter++;

    if (gameSpeedMode === 2) {
        if (speedFrameCounter % 2 === 0) {
            originalUpdate();
        }
        return;
    }

    if (gameSpeedMode === 4) {
        if (speedFrameCounter % 4 === 0) {
            originalUpdate();
        }
        return;
    }

    // 万一変な値になった時の保険
    originalUpdate();
};

// 27.4 キー操作
// Spaceで一時停止した瞬間だけ passScoreText を計算

document.addEventListener('keydown', (e) => {
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;

    if (e.code === 'Space') {
        e.preventDefault();
        isPausedByUser = !isPausedByUser;

        if (isPausedByUser) {
            clearPassScoreTexts();

            const ballHolder = getBallHolder();
            if (ballHolder) {
                const team = getTeamByName(ballHolder.team);
                chooseBestPassTarget(ballHolder, team);
            }
        } else {
            clearPassScoreTexts();
        }
        return;
    }

    if (e.key === 'n' || e.key === 'N') {
        if (isPausedByUser) {
            stepRequested = true;
        }
        return;
    }

    if (e.key === '1') {
        gameSpeedMode = 1;
        return;
    }

    if (e.key === '2') {
        gameSpeedMode = 2;
        return;
    }

    if (e.key === '3') {
        gameSpeedMode = 4;
        return;
    }
});

// 27.5 画面表示を少し足したい場合は drawUI もラップ
const originalDrawUI = drawUI;

drawUI = function () {
    originalDrawUI();

    let speedText = 'x1';
    if (gameSpeedMode === 2) speedText = 'x0.5';
    if (gameSpeedMode === 4) speedText = 'x0.25';

    ctx.fillStyle = 'white';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'left';

    const pauseText = isPausedByUser ? 'PAUSE' : 'RUN';
    ctx.fillText(`Speed: ${speedText}`, 20, 28);
    ctx.fillText(`State: ${pauseText}`, 20, 48);
    ctx.fillText(`Keys: 1 normal / 2 half / 3 quarter / Space pause / N step`, 20, 68);
};
</script>
